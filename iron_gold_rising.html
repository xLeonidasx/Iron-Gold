<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Gold Rising">
<meta name="theme-color" content="#080c08">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23080c08' width='180' height='180' rx='40'/><text x='90' y='122' font-size='90' fill='%23c9a227' text-anchor='middle' font-weight='bold' font-family='Georgia'>⚔</text></svg>">
<title>Iron Gold Rising — Training Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Barlow+Condensed:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* iOS-specific optimizations */
  html { -webkit-text-size-adjust: 100%; height: -webkit-fill-available; }
  * { -webkit-tap-highlight-color: transparent; }
  input, textarea, select, button { -webkit-appearance: none; appearance: none; }
  input, textarea { font-size: 16px !important; } /* prevents iOS zoom on focus */
  body { -webkit-overflow-scrolling: touch; overscroll-behavior-y: none; }
  button, .nav-btn, .day-tab, .sub-btn, .done-btn, .supp-add-btn, .mg-head, .hist-head { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

  :root {
    --bg: #080c08;
    --surface: #0e140e;
    --surface2: #141c14;
    --surface3: #1a241a;
    --border: #1e2a1e;
    --border2: #2a3a2a;
    --text: #e8ede0;
    --muted: #7a8c6e;
    --dim: #4a5a42;
    --gold: #c9a227;
    --gold2: #e8c547;
    --gold-dim: #7a5f10;
    --green: #3a6b2a;
    --green2: #4d8a3a;
    --green-bright: #6aaa50;
    --str: #5aa0e0;
    --hype: #6aaa50;
    --iso: #c9a227;
    --warm: #a78bfa;
    --pull: #e87070;
    --core: #e8a070;
    --danger: #d05a5a;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    position: relative;
    overflow-x: hidden;
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
  }

  /* PARTICLES */
  #particle-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* KINTSUGI */
  .kintsugi-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    opacity: 0.16;
  }

  /* VINES */
  .vine-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    opacity: 0.25;
  }
  .vine-path {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: grow-vine 3s ease-out forwards;
  }
  .vine-leaf {
    opacity: 0;
    animation: leaf-appear 0.6s ease-out forwards;
    transform-box: fill-box;
    transform-origin: center;
  }
  @keyframes grow-vine { to { stroke-dashoffset: 0; } }
  @keyframes leaf-appear { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }

  .main-wrap { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }

  /* QUOTES WIDGET */
  .quotes-widget {
    background:
      radial-gradient(120% 100% at 50% 0%, rgba(201,162,39,0.07), transparent 60%),
      linear-gradient(135deg, #0e160a 0%, #0c1308 55%, #100a06 100%);
    border-bottom: 1px solid var(--border2);
    padding: calc(20px + env(safe-area-inset-top)) 52px 22px;
    position: relative;
    overflow: hidden;
    min-height: 204px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  .quotes-widget::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .quotes-widget::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  /* faint corner flourishes */
  .qw-flourish { position: absolute; width: 26px; height: 26px; opacity: 0.4; pointer-events: none; }
  .qw-flourish.tl { top: 10px; left: 12px; }
  .qw-flourish.tr { top: 10px; right: 12px; transform: scaleX(-1); }
  .qw-flourish.bl { bottom: 10px; left: 12px; transform: scaleY(-1); }
  .qw-flourish.br { bottom: 10px; right: 12px; transform: scale(-1,-1); }

  .quote-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.22em; color: var(--gold); margin-bottom: 12px; opacity: 0.75;
  }

  /* PORTRAIT MEDALLION */
  .quote-portrait { width: 66px; height: 66px; margin-bottom: 12px; position: relative; }
  .quote-portrait svg { width: 100%; height: 100%; display: block; }
  .quote-portrait.animate-in { animation: portrait-in 0.8s cubic-bezier(0.2,0.7,0.3,1); }
  @keyframes portrait-in {
    0% { opacity: 0; transform: scale(0.6) rotate(-8deg); filter: blur(3px); }
    60% { opacity: 1; }
    100% { opacity: 1; transform: scale(1) rotate(0); filter: blur(0); }
  }
  .qp-ring { transform-origin: center; animation: ring-draw 0.9s ease-out; }
  @keyframes ring-draw { from { stroke-dashoffset: 220; } to { stroke-dashoffset: 0; } }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-style: italic; color: var(--text);
    line-height: 1.45; margin-bottom: 10px; max-width: 460px;
    text-wrap: balance;
  }
  .quote-text .qmark { color: var(--gold); opacity: 0.5; font-size: 24px; font-weight: 600; }
  .quote-author {
    font-size: 11px; color: var(--gold); letter-spacing: 0.14em; text-transform: uppercase;
    font-weight: 600; margin-bottom: 3px;
  }
  .quote-author::before, .quote-author::after {
    content: ''; display: inline-block; width: 16px; height: 1px;
    background: var(--gold-dim); vertical-align: middle; margin: 0 8px;
  }
  .quote-book {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-style: italic; color: var(--muted);
    letter-spacing: 0.02em;
  }
  .quote-text.animate-in { animation: quote-in 0.7s cubic-bezier(0.2,0.7,0.3,1); }
  .quote-author.animate-in { animation: quote-in 0.7s cubic-bezier(0.2,0.7,0.3,1) 0.12s both; }
  .quote-book.animate-in { animation: quote-in 0.7s cubic-bezier(0.2,0.7,0.3,1) 0.2s both; }
  @keyframes quote-in {
    from { opacity: 0; transform: translateY(8px); letter-spacing: 0.1em; filter: blur(2px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  /* NAV ARROWS */
  .q-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border2); background: rgba(20,28,20,0.6);
    color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; backdrop-filter: blur(4px); z-index: 3;
  }
  .q-arrow:hover { background: rgba(201,162,39,0.12); border-color: var(--gold-dim); transform: translateY(-50%) scale(1.08); }
  .q-arrow:active { transform: translateY(-50%) scale(0.94); }
  .q-arrow.left { left: 10px; }
  .q-arrow.right { right: 10px; }
  .q-arrow svg { width: 16px; height: 16px; }

  /* HEADER */
  .header {
    padding: 18px 20px 14px; border-bottom: 1px solid var(--border2);
    background: linear-gradient(180deg, #0c140a 0%, var(--bg) 100%);
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    background: linear-gradient(135deg, var(--gold2), var(--gold), #a07820);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1; margin-bottom: 4px;
  }
  .header-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }

  /* MAIN NAV */
  .main-nav { display: flex; border-bottom: 1px solid var(--border2); background: var(--surface); overflow-x: auto; }
  .nav-btn {
    flex: 1; min-width: 72px; padding: 11px 6px; text-align: center; cursor: pointer;
    font-size: 11px; font-weight: 600; color: var(--muted); border-right: 1px solid var(--border2);
    text-transform: uppercase; letter-spacing: 0.04em; transition: all 0.12s; white-space: nowrap;
  }
  .nav-btn:last-child { border-right: none; }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn.active { background: var(--surface2); color: var(--gold); }
  .nav-btn.active { box-shadow: inset 0 -2px 0 var(--gold); }

  /* NUTRITION */
  .nutrition-bar { display: flex; border-bottom: 1px solid var(--border2); background: var(--surface); }
  .nut-item { flex: 1; padding: 10px 14px; border-right: 1px solid var(--border2); }
  .nut-item:last-child { border-right: none; }
  .nut-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
  .nut-val {
    font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .nut-unit { font-size: 10px; color: var(--muted); margin-left: 2px; }

  /* DAY TABS */
  .day-tabs { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border2); background: var(--surface); }
  .day-tab { padding: 11px 4px 9px; text-align: center; cursor: pointer; border-right: 1px solid var(--border2); transition: background 0.12s; position: relative; }
  .day-tab:last-child { border-right: none; }
  .day-tab:hover { background: var(--surface2); }
  .day-tab.active { background: var(--surface2); }
  .day-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .tab-sub { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .tab-label { font-size: 11px; font-weight: 600; color: var(--muted); }
  .day-tab.active .tab-label { color: var(--gold); }
  .day-tab.rest .tab-label { color: var(--dim); }
  .completion-dot { position: absolute; top: 5px; right: 50%; transform: translateX(50%); width: 5px; height: 5px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 4px var(--gold); opacity: 0; transition: opacity 0.3s; }
  .completion-dot.show { opacity: 1; }

  /* CONTENT */
  .content { padding: 14px 16px; }
  .day-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 12px; color: var(--green-bright); }

  .section { margin-bottom: 12px; }
  .section-label { display: inline-flex; align-items: center; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 2px; margin-bottom: 7px; }
  .label-str { background: #0a1a2e; color: var(--str); border: 1px solid #0d2a4a; }
  .label-hype { background: #0a1a0a; color: var(--hype); border: 1px solid #1a3a10; }
  .label-iso { background: #1a1200; color: var(--iso); border: 1px solid #2a1e00; }
  .label-warm { background: #130e20; color: var(--warm); border: 1px solid #1e1535; }
  .label-pull { background: #1e0a0a; color: var(--pull); border: 1px solid #2e1010; }
  .label-core { background: #1e0e00; color: var(--core); border: 1px solid #2e1800; }

  .ex-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; overflow: hidden; position: relative; margin-bottom: 8px; }
  .ex-card::before { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: linear-gradient(180deg, var(--green), transparent); }
  .ex-head { padding: 9px 12px 9px 14px; }
  .ex-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .ex-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .ex-tip { font-size: 11px; color: var(--dim); margin-top: 3px; line-height: 1.4; }
  .ex-target { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--gold); white-space: nowrap; padding-top: 1px; letter-spacing: 0.02em; }
  .last-ref { font-size: 10px; color: var(--green2); margin-top: 4px; }

  /* SET TRACKER */
  .sets-wrap { padding: 0 12px 10px 14px; }
  .set-head { display: grid; grid-template-columns: 28px 1fr 1fr 38px; gap: 7px; padding: 4px 0; }
  .set-head span { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 38px; gap: 7px; align-items: center; margin-bottom: 6px; }
  .set-num { font-size: 11px; color: var(--dim); text-align: center; }
  .set-row input { padding: 6px 6px; font-size: 13px; border-radius: 3px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); width: 100%; text-align: center; font-family: 'Inter', sans-serif; }
  .set-row input:focus { outline: none; border-color: var(--gold-dim); }
  .done-btn { width: 32px; height: 30px; border-radius: 3px; border: 1px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
  .done-btn.done { background: #0d2410; border-color: var(--green); }
  .done-btn svg { width: 14px; height: 14px; }

  .notes-field { width: 100%; margin-top: 8px; padding: 8px 10px; font-size: 12px; border-radius: 3px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-family: 'Inter', sans-serif; resize: vertical; min-height: 38px; }
  .notes-field:focus { outline: none; border-color: var(--gold-dim); }
  .notes-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; margin: 12px 0 5px; }

  /* COACH NOTE */
  .coach-note { margin-top: 14px; padding: 11px 13px; background: var(--surface); border-left: 2px solid var(--green); position: relative; }
  .coach-note::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--green), transparent); }
  .coach-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green-bright); margin-bottom: 5px; }
  .coach-text { font-size: 12px; color: var(--muted); line-height: 1.6; }

  /* REST SCREEN */
  .rest-screen { padding: 28px 16px; text-align: center; }
  .rest-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; letter-spacing: 0.05em; }
  .rest-list { list-style: none; max-width: 360px; margin: 0 auto; }
  .rest-list li { font-size: 13px; color: var(--dim); padding: 7px 0; border-bottom: 1px solid var(--border); }
  .rest-list li:last-child { border-bottom: none; }
  .rest-list li::before { content: '—'; margin-right: 8px; color: var(--gold); }

  /* RULES */
  .rules { margin: 0 16px 20px; background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; overflow: hidden; position: relative; }
  .rules::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--gold-dim), transparent); }
  .rules-title { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); padding: 9px 12px 7px; border-bottom: 1px solid var(--border2); }
  .rule-row { display: flex; justify-content: space-between; padding: 7px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .rule-row:last-child { border-bottom: none; }
  .rule-key { color: var(--muted); }
  .rule-val { color: var(--text); font-weight: 500; }

  /* REST TIMER OVERLAY */
  .rest-timer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: linear-gradient(180deg, #0e160a, #0a120a); border-top: 1px solid var(--gold-dim); padding: 14px 20px calc(14px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2,0.7,0.3,1); max-width: 640px; margin: 0 auto; }
  .rest-timer.show { transform: translateY(0); }
  .rest-timer-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .rt-label { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  .rt-time { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 700; color: var(--text); line-height: 1; }
  .rt-controls { display: flex; gap: 8px; }
  .rt-btn { padding: 8px 14px; border-radius: 4px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; font-weight: 500; }
  .rt-btn:hover { background: var(--surface3); }
  .rt-btn.primary { border-color: var(--gold-dim); color: var(--gold); }
  .rt-progress { position: absolute; top: 0; left: 0; height: 2px; background: var(--gold); transition: width 1s linear; }

  /* TRACKER TABS (bodyweight/calorie/fasting/PR) */
  .panel { padding: 16px; }
  .panel-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 4px; color: var(--green-bright); }
  .panel-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 5px; padding: 14px; margin-bottom: 14px; position: relative; overflow: hidden; }
  .card-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gold); margin-bottom: 10px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .input-row input, .input-row select { flex: 1; padding: 9px 10px; font-size: 13px; border-radius: 4px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-family: 'Inter', sans-serif; }
  .input-row input:focus, .input-row select:focus { outline: none; border-color: var(--gold-dim); }
  .btn { padding: 9px 16px; border-radius: 4px; border: 1px solid var(--gold-dim); background: linear-gradient(135deg, #1a1400, #120e00); color: var(--gold); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .btn:hover { background: linear-gradient(135deg, #241c00, #1a1400); }
  .btn:active { transform: scale(0.97); }
  .btn-sm { padding: 6px 10px; font-size: 11px; }
  .btn-danger { border-color: #3a1a1a; color: var(--danger); background: #160a0a; }

  /* CHART */
  .chart-wrap { width: 100%; height: 160px; margin-top: 8px; position: relative; }
  svg.chart { width: 100%; height: 100%; overflow: visible; }
  .chart-empty { font-size: 12px; color: var(--dim); text-align: center; padding: 40px 0; }

  /* EXERCISE LIBRARY */
  .muscle-group { margin-bottom: 10px; border: 1px solid var(--border2); border-radius: 5px; overflow: hidden; background: var(--surface); }
  .mg-head { padding: 11px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.12s; }
  .mg-head:hover { background: var(--surface2); }
  .mg-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .mg-count { font-size: 10px; color: var(--gold); }
  .mg-chevron { color: var(--dim); transition: transform 0.2s; font-size: 11px; }
  .mg-head.open .mg-chevron { transform: rotate(90deg); }
  .mg-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .mg-body.open { max-height: 1200px; }
  .lib-ex { padding: 9px 14px; border-top: 1px solid var(--border); }
  .lib-ex-name { font-size: 12px; color: var(--text); font-weight: 500; display: flex; justify-content: space-between; }
  .lib-ex-region { font-size: 10px; color: var(--green2); }
  .lib-ex-note { font-size: 11px; color: var(--dim); margin-top: 3px; line-height: 1.4; }

  /* trend stat */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-box { background: var(--surface2); border-radius: 4px; padding: 10px 12px; }
  .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .trend-up { color: var(--green-bright); }
  .trend-down { color: var(--danger); }

  .log-list { margin-top: 10px; }
  .log-item { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .log-item:last-child { border-bottom: none; }
  .log-date { color: var(--muted); }
  .log-val { color: var(--text); font-weight: 500; }

  /* WORKOUT HISTORY */
  .hist-entry { border: 1px solid var(--border2); border-radius: 5px; margin-bottom: 8px; overflow: hidden; }
  .hist-head { padding: 10px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.12s; }
  .hist-head:hover { background: var(--surface2); }
  .hist-head.open .mg-chevron { transform: rotate(90deg); }

/* ============ QUOTES ============ */
let qIdx = 0, qTimer, quoteOrder = [];

// The "source" for adjacency purposes is the book/work, so two quotes from the
// same book never appear back to back regardless of who is speaking.
function sourceKey(quote) {
  return (quote && quote.b) ? quote.b : '';
}

// Shuffle, then reorder greedily so no two consecutive quotes share a book.
function buildQuoteOrder() {
  let idx = QUOTES.map((_,i)=>i);
  // Fisher-Yates shuffle
  for (let i=idx.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  // Greedy spread: repeatedly pick the next quote whose book differs from the previous,
  // preferring the book with the most remaining quotes to keep things balanced.
  const remaining = idx.slice();
  const result = [];
  let lastSrc = null;
  while (remaining.length) {
    let pick = -1;
    const counts = {};
    remaining.forEach(i => { const s=sourceKey(QUOTES[i]); counts[s]=(counts[s]||0)+1; });
    let bestSrc = null, bestCount = -1;
    Object.keys(counts).forEach(s => { if (s!==lastSrc && counts[s]>bestCount) { bestCount=counts[s]; bestSrc=s; } });
    if (bestSrc === null) { pick = 0; }
    else { pick = remaining.findIndex(i => sourceKey(QUOTES[i]) === bestSrc); }
    const chosen = remaining.splice(pick,1)[0];
    result.push(chosen);
    lastSrc = sourceKey(QUOTES[chosen]);
  }
  return result;
}

function renderQuote(pos) {
  const i = quoteOrder[pos];
  const Q = QUOTES[i];
  const qt = document.getElementById('q-text'), qa = document.getElementById('q-author'),
        qb = document.getElementById('q-book'), qp = document.getElementById('q-portrait');
  qt.classList.remove('animate-in'); qa.classList.remove('animate-in');
  if (qb) qb.classList.remove('animate-in');
  if (qp) qp.classList.remove('animate-in');
  void qt.offsetWidth;
  qt.innerHTML = '<span class="qmark">“</span>' + Q.q + '<span class="qmark">”</span>';
  qa.textContent = Q.s;
  if (qb) qb.textContent = Q.b;
  if (qp) { qp.innerHTML = portraitSvg(Q); qp.classList.add('animate-in'); }
  qt.classList.add('animate-in'); qa.classList.add('animate-in');
  if (qb) qb.classList.add('animate-in');
}
function initQuotes() {
  quoteOrder = buildQuoteOrder();
  qIdx = 0; renderQuote(0); startQTimer();
}
function startQTimer() { clearInterval(qTimer); qTimer = setInterval(()=>{ qIdx=(qIdx+1)%quoteOrder.length; renderQuote(qIdx); }, 6000); }
function nextQuote() { clearInterval(qTimer); qIdx=(qIdx+1)%quoteOrder.length; renderQuote(qIdx); startQTimer(); }
function prevQuote() { clearInterval(qTimer); qIdx=(qIdx-1+quoteOrder.length)%quoteOrder.length; renderQuote(qIdx); startQTimer(); }

function portraitInner(quote) {
  // Map each book/speaker to a representative animal emblem.
  const b = quote.b || '', s = quote.s || '';
  let animal;
  if (b === 'Red Rising') animal = 'wolf';
  else if (b === "Ender's Game") animal = 'dragon';      // Chinese dragon
  else if (b === 'The Art of War') animal = 'falcon';    // falcon for Sun Tzu
  else if (s === 'Robert Greene') animal = 'cobra';
  else if (s === 'Marcus Aurelius') animal = 'lion';
  else if (s === 'Seneca') animal = 'owl';
  else if (s === 'Epictetus') animal = 'eagle';
  else if (s === 'Zeno of Citium') animal = 'bear';
  else if (s === 'Confucius') animal = 'tiger';          // tiger -> Confucius
  else if (s === 'Niccolò Machiavelli') animal = 'fox';
  else animal = 'lion';
  return animalSvg(animal);
}

/* ============ PARTICLES ============ */
function initParticles() {
  const c = document.getElementById('particle-canvas'), ctx = c.getContext('2d');
  let w, h, particles;
  function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  particles = Array.from({length: 28}, () => ({
    x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.6+0.4,
    vy: -(Math.random()*0.25+0.06), vx: (Math.random()-0.5)*0.18,
    a: Math.random()*0.4+0.1, drift: Math.random()*Math.PI*2
  }));
  function tick() {
    ctx.clearRect(0,0,w,h);
    for (const p of particles) {
      p.y += p.vy; p.drift += 0.01; p.x += p.vx + Math.sin(p.drift)*0.15;
      if (p.y < -5) { p.y = h+5; p.x = Math.random()*w; }
      if (p.x < -5) p.x = w+5; if (p.x > w+5) p.x = -5;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(201,162,39,${p.a})`; ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  tick();
}

/* ============ REST TIMER ============ */
let timerInterval, timerRemaining, timerTotal;
function startRestTimer(seconds, label) {
  clearInterval(timerInterval);
  timerTotal = seconds; timerRemaining = seconds;
  document.getElementById('rt-label').textContent = label + ' rest';
  updateTimerDisplay();
  document.getElementById('rest-timer').classList.add('show');
  timerInterval = setInterval(()=>{
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) { finishTimer(); }
  }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(Math.max(0,timerRemaining)/60), s = Math.max(0,timerRemaining)%60;
  document.getElementById('rt-time').textContent = m+':'+String(s).padStart(2,'0');
  document.getElementById('rt-progress').style.width = (100*(timerTotal-timerRemaining)/timerTotal)+'%';
}
function finishTimer() {
  clearInterval(timerInterval);
  beep(); if (navigator.vibrate) navigator.vibrate([200,100,200]);
  document.getElementById('rt-time').textContent = "Done";
  setTimeout(dismissTimer, 1500);
}
function adjustTimer(d) { timerRemaining = Math.max(1, timerRemaining + d); timerTotal = Math.max(timerTotal, timerRemaining); updateTimerDisplay(); }
function dismissTimer() { clearInterval(timerInterval); document.getElementById('rest-timer').classList.remove('show'); }
function beep() {
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.2,0.4].forEach(t=>{
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = 740; o.type = 'sine';
      g.gain.setValueAtTime(0.0001, ac.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.3, ac.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+t+0.15);
      o.start(ac.currentTime+t); o.stop(ac.currentTime+t+0.16);
    });
  } catch(e) {}
}

function isDayComplete(dayIdx, sessions) {
  if (DAYS[dayIdx].r) return false;
  const w = W[dayIdx]; if (!w) return false;
  const key = dayIdx + ':' + todayStr();
  const sess = sessions[key];
  if (!sess) return false;
  let totalSets = 0, doneSets = 0;
  w.secs.forEach((sec,si) => sec.ex.forEach((ex,ei) => {
    for (let s=0; s<ex.sets; s++) { totalSets++; if (sess[`${si}-${ei}-${s}`]?.done) doneSets++; }
  }));
  return totalSets > 0 && doneSets === totalSets;
}

function checkSvg(done) {
  return done
    ? `<svg viewBox="0 0 14 14" fill="none"><path d="M2.5 7l3 3 6-6.5" stroke="#6aaa50" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    : `<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="4.5" stroke="#2a3a2a" stroke-width="1"/></svg>`;
}

function findLastSession(dayIdx, sessions) {
  const today = todayStr();
  let best = null;
  Object.keys(sessions).forEach(k => {
    const [d, date] = k.split(':');
    if (+d === dayIdx && date !== today) {
      if (!best || date > best.date) best = {date, data: sessions[k]};
    }
  });
  return best;
}

function lastBest(data, si, ei) {
  let bw = 0, br = 0, found = false;
  Object.keys(data).forEach(k => {
    const parts = k.split('-');
    if (parts.length===3 && +parts[0]===si && +parts[1]===ei) {
      const c = data[k];
      if (c.w && c.reps && +c.w >= bw) { bw = +c.w; br = +c.reps; found = true; }
    }
  });
  return found ? `${bw}lbs × ${br}` : null;
}

function saveSet(si, ei, s, field, val) {
  const sessions = DB.get('sessions', {});
  const key = activeDay + ':' + todayStr();
  if (!sessions[key]) sessions[key] = {};
  const cell = sessions[key][`${si}-${ei}-${s}`] || {};
  cell[field] = val;
  sessions[key][`${si}-${ei}-${s}`] = cell;
  DB.set('sessions', sessions);
  maybeUpdatePR(si, ei);
}

function toggleSet(si, ei, s, secClass) {
  const sessions = DB.get('sessions', {});
  const key = activeDay + ':' + todayStr();
  if (!sessions[key]) sessions[key] = {};
  const cell = sessions[key][`${si}-${ei}-${s}`] || {};
  cell.done = !cell.done;
  sessions[key][`${si}-${ei}-${s}`] = cell;
  DB.set('sessions', sessions);
  // update button
  const btn = document.querySelector(`#sr-${si}-${ei}-${s} .done-btn`);
  if (btn) { btn.classList.toggle('done', cell.done); btn.innerHTML = checkSvg(cell.done); }

  if (cell.done) {
    const secName = W[activeDay].secs[si].l;
    startRestTimer(SECTION_REST[secClass] || 90, secName);
  }
  maybeUpdatePR(si, ei);
}

/* ============ PR TRACKING ============ */
function maybeUpdatePR(si, ei) {
  const ex = W[activeDay].secs[si].ex[ei];
  if (!MAIN_LIFTS.some(m => ex.n.includes(m.split(' (')[0]))) return;
  const sessions = DB.get('sessions', {});
  const key = activeDay + ':' + todayStr();
  const sess = sessions[key]; if (!sess) return;
  // find best e1RM today for this exercise
  let bestE1RM = 0, bestW = 0, bestR = 0;
  for (let s=0; s<ex.sets; s++) {
    const c = sess[`${si}-${ei}-${s}`];
    if (c && c.w && c.reps) {
      const e1rm = +c.w * (1 + (+c.reps)/30); // Epley
      if (e1rm > bestE1RM) { bestE1RM = e1rm; bestW = +c.w; bestR = +c.reps; }
    }
  }
  if (bestE1RM === 0) return;
  const prs = DB.get('prs', {});
  if (!prs[ex.n]) prs[ex.n] = [];
  // upsert today's entry
  const today = todayStr();
  const existing = prs[ex.n].find(e => e.date === today);
  if (existing) { existing.e1rm = Math.round(bestE1RM); existing.w = bestW; existing.reps = bestR; }
  else { prs[ex.n].push({date: today, e1rm: Math.round(bestE1RM), w: bestW, reps: bestR}); }
  prs[ex.n].sort((a,b)=>a.date.localeCompare(b.date));
  DB.set('prs', prs);
}

function drawLineChart(id, points, color) {
  const svg = document.getElementById(id);
  if (!svg || points.length === 0) return;
  const W_ = svg.clientWidth || 300, H_ = svg.clientHeight || 160;
  const pad = {l: 30, r: 10, t: 14, b: 22};
  const ys = points.map(p=>p.y);
  let minY = Math.min(...ys), maxY = Math.max(...ys);
  if (minY === maxY) { minY -= 5; maxY += 5; }
  const range = maxY - minY;
  minY -= range*0.1; maxY += range*0.1;
  const n = points.length;
  const xFor = i => pad.l + (n===1 ? (W_-pad.l-pad.r)/2 : i*(W_-pad.l-pad.r)/(n-1));
  const yFor = v => pad.t + (1-(v-minY)/(maxY-minY))*(H_-pad.t-pad.b);

  let svgC = '';
  // gridlines
  for (let g=0; g<=3; g++) {
    const val = minY + (maxY-minY)*g/3;
    const yy = yFor(val);
    svgC += `<line x1="${pad.l}" y1="${yy}" x2="${W_-pad.r}" y2="${yy}" stroke="#1e2a1e" stroke-width="1"/>`;
    svgC += `<text x="${pad.l-5}" y="${yy+3}" text-anchor="end" font-size="8" fill="#4a5a42">${Math.round(val)}</text>`;
  }
  // area + line
  if (n > 1) {
    let d = `M ${xFor(0)} ${yFor(points[0].y)}`;
    for (let i=1;i<n;i++) d += ` L ${xFor(i)} ${yFor(points[i].y)}`;
    let area = d + ` L ${xFor(n-1)} ${H_-pad.b} L ${xFor(0)} ${H_-pad.b} Z`;
    svgC += `<path d="${area}" fill="${color}" opacity="0.08"/>`;
    svgC += `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>`;
  }
  // points
  points.forEach((p,i)=>{
    svgC += `<circle cx="${xFor(i)}" cy="${yFor(p.y)}" r="2.5" fill="${color}"/>`;
    if (i===0 || i===n-1 || n<=5) svgC += `<text x="${xFor(i)}" y="${H_-pad.b+12}" text-anchor="middle" font-size="8" fill="#4a5a42">${fmtDate(p.x)}</text>`;
  });
  svg.innerHTML = svgC;
}

  else log.push({date: today, kg: kg?+kg:null, cal: cal?+cal:null});

  DB.set('bodylog', log);
  renderView();
}

let fastInterval;
function initFastDisplay() {
  clearInterval(fastInterval);
  updateFastDisplay();
  const fast = DB.get('fast', null);
  const btns = document.getElementById('fast-btns');
  if (fast && fast.start) {
    btns.innerHTML = `<button class="btn btn-danger" onclick="endFast()">End fast</button>`;
    fastInterval = setInterval(updateFastDisplay, 1000);
  } else {
    btns.innerHTML = `<button class="btn" onclick="startFast()">Start fasting</button>`;
  }
}
function startFast() {
  const target = +document.getElementById('fast-target').value;
  DB.set('fast', {start: Date.now(), target});
  initFastDisplay();
}
function endFast() { DB.set('fast', null); clearInterval(fastInterval); initFastDisplay(); }
function updateFastDisplay() {
  const fast = DB.get('fast', null);
  const timeEl = document.getElementById('fast-time'), statusEl = document.getElementById('fast-status'), ring = document.getElementById('fast-ring-svg');
  if (!timeEl) return;
  if (!fast || !fast.start) {
    timeEl.textContent = '—'; statusEl.textContent = 'Not fasting'; ring.innerHTML = ringSvg(0); return;
  }
  const elapsed = (Date.now()-fast.start)/1000;
  const targetSec = fast.target*3600;
  const h = Math.floor(elapsed/3600), m = Math.floor((elapsed%3600)/60), s = Math.floor(elapsed%60);
  timeEl.textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pct = Math.min(1, elapsed/targetSec);
  if (elapsed >= targetSec) { statusEl.textContent = `Target reached! ${(elapsed/3600).toFixed(1)}h elapsed`; statusEl.style.color = 'var(--green-bright)'; }
  else { const rem = targetSec - elapsed; statusEl.textContent = `${Math.floor(rem/3600)}h ${Math.floor((rem%3600)/60)}m until ${fast.target}h target`; statusEl.style.color = 'var(--muted)'; }
  ring.innerHTML = ringSvg(pct);
}
function ringSvg(pct) {
  const r = 52, c = 2*Math.PI*r, off = c*(1-pct);
  return `<circle cx="60" cy="60" r="${r}" fill="none" stroke="#1e2a1e" stroke-width="7"/>
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="#c9a227" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 0.5s"/>`;
}

  "squat": ["Hip circles + leg swings — 1 min","Bodyweight squats — 1 × 15","Walking knee hugs — 10 steps","Empty bar squat — 1 × 10","Ramp set @ 50% — 1 × 8","Ramp set @ 70% — 1 × 5"],
  "deadlift": ["Cat-cow + hip hinge drill — 1 min","Glute bridges — 1 × 15","Bodyweight good mornings — 1 × 10","Bar @ 40% — 1 × 8","Ramp set @ 60% — 1 × 5","Ramp set @ 75% — 1 × 3"],
  "row": ["Band pull-aparts — 1 × 20","Scapular retractions — 1 × 12","Light row @ 50% — 1 × 10","Ramp set @ 70% — 1 × 6"],
  "default": ["5 min light cardio (bike/row)","Dynamic stretches for target muscles — 2 min","2 ramp-up sets on your first compound at 50% and 70%"]
};

function getWarmup(w) {
  // Find first strength exercise
  let mainLift = "";
  for (const sec of w.secs) {
    if (sec.c === 'str' && sec.ex.length) { mainLift = sec.ex[0].n.toLowerCase(); break; }
  }
  if (!mainLift) for (const sec of w.secs) { if (sec.ex.length && sec.ex[0].sets>0) { mainLift = sec.ex[0].n.toLowerCase(); break; } }
  let key = "default";
  if (/press|bench/.test(mainLift)) key = "press";
  else if (/squat/.test(mainLift)) key = "squat";
  else if (/deadlift/.test(mainLift)) key = "deadlift";
  else if (/row|pulldown/.test(mainLift)) key = "row";
  return { lift: mainLift, steps: WARMUP_MAP[key] };
}

/* ============ WEEKLY SUMMARY ============ */
function summaryView() {
  const sessions = DB.get('sessions', {});
  const bodylog = DB.get('bodylog', []);
  const recovery = DB.get('recovery', []);
  const prs = DB.get('prs', {});

  // This week's date range (last 7 days)
  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
  const inWeek = d => { const dt = new Date(d+'T00:00'); return dt >= weekAgo && dt <= now; };

  // Sessions completed this week
  let sessionsThisWeek = 0, totalVolume = 0, totalSets = 0;
  Object.keys(sessions).forEach(k => {
    const [dayIdx, date] = k.split(':');
    if (inWeek(date)) {
      let hasData = false;
      Object.keys(sessions[k]).forEach(sk => {
        if (sk.startsWith('_')) return;
        const c = sessions[k][sk];
        if (c.done || (c.w && c.reps)) hasData = true;
        if (c.w && c.reps) { totalVolume += +c.w * +c.reps; totalSets++; }
      });
      if (hasData) sessionsThisWeek++;
    }
  });

  // Avg calories & sleep this week
  const weekBody = bodylog.filter(e=>inWeek(e.date));
  let avgCal = 0, calN = 0, latestW = null;
  weekBody.forEach(e=>{ if(e.cal){avgCal+=e.cal;calN++;} if(e.kg) latestW=e.kg; });
  avgCal = calN ? Math.round(avgCal/calN) : 0;

  // Weight change this week
  let weekWChange = null;
  const weekW = weekBody.filter(e=>e.kg);
  if (weekW.length >= 2) weekWChange = +(weekW[weekW.length-1].kg - weekW[0].kg).toFixed(1);

  // Avg recovery this week
  const weekRec = recovery.filter(e=>inWeek(e.date));
  let avgFatigue = 0, recN = 0;
  weekRec.forEach(e=>{ if(e.fatigue){avgFatigue+=e.fatigue;recN++;} });
  avgFatigue = recN ? (avgFatigue/recN).toFixed(1) : null;

  // PR gains this week
  let prGains = 0;
  Object.keys(prs).forEach(lift => {
    const inWk = prs[lift].filter(e=>inWeek(e.date));
    if (inWk.length >= 2) { const g = inWk[inWk.length-1].e1rm - inWk[0].e1rm; if (g>0) prGains += g; }
  });

  let h = `<div class="panel"><div class="panel-title">Weekly Summary</div><div class="panel-sub">Your last 7 days at a glance. Are you winning the week?</div>`;

  h += `<div class="card"><div class="card-title">Training</div>

      <div class="stat-box"><div class="stat-num">${sessionsThisWeek}<span style="font-size:12px;color:var(--muted)">/5</span></div><div class="stat-lbl">Sessions done</div></div>

      <div class="stat-box"><div class="stat-num ${prGains>0?'trend-up':''}">${prGains>0?'+':''}${prGains}<span style="font-size:12px;color:var(--muted)">lbs</span></div><div class="stat-lbl">Est. 1RM gains</div></div>
    </div>
  </div>`;

  h += `<div class="card"><div class="card-title">Nutrition & Body</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${avgCal||'—'}</div><div class="stat-lbl">Avg kcal/day</div></div>
      <div class="stat-box"><div class="stat-num ${avgCal&&avgCal<=2350?'trend-up':'trend-down'}">${avgCal?((avgCal-2350)>0?'+':'')+(avgCal-2350):'—'}</div><div class="stat-lbl">vs cut target</div></div>
      <div class="stat-box"><div class="stat-num">${latestW||'—'}<span style="font-size:12px;color:var(--muted)">kg</span></div><div class="stat-lbl">Latest weight</div></div>
      <div class="stat-box"><div class="stat-num ${weekWChange!==null&&weekWChange<=0?'trend-up':'trend-down'}">${weekWChange!==null?(weekWChange>0?'+':'')+weekWChange:'—'}<span style="font-size:12px;color:var(--muted)">kg</span></div><div class="stat-lbl">Weight Δ (7d)</div></div>
    </div>
  </div>`;

  h += `<div class="card"><div class="card-title">Recovery</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${avgFatigue||'—'}<span style="font-size:12px;color:var(--muted)">/10</span></div><div class="stat-lbl">Avg fatigue</div></div>
      <div class="stat-box"><div class="stat-num">${weekRec.length}</div><div class="stat-lbl">Days logged</div></div>
    </div>
  </div>`;

  // Verdict
  let wins = 0;
  if (sessionsThisWeek >= 4) wins++;
  if (avgCal && avgCal <= 2400) wins++;
  if (prGains > 0) wins++;
  if (weekWChange !== null && weekWChange <= 0) wins++;
  const verdicts = [
    "Tough week. Reset and attack the next one.",
    "Some progress. Tighten up the weak areas.",
    "Solid week. You're moving in the right direction.",
    "Strong week. Consistency is paying off.",
    "Dominant week. This is exactly how it's done."
  ];
  h += `<div class="card" style="border-color:var(--gold-dim);">

  // ── WORKOUT MEMORY / HISTORY ──
  const history = DB.get('history', []);
  h += `<div class="card"><div class="card-title">Workout Memory</div>`;
  if (!history.length) {
    h += `<div style="font-size:12px;color:var(--dim);padding:10px 0;">No logged workouts yet. Finish a session in the Train tab and tap "Log Workout" to save it here.</div>`;

          <div>
            <div class="hist-day">${entry.day} <span style="color:var(--dim);font-weight:400;">· ${fmtDate(entry.date)}</span></div>
            <div class="hist-meta">${entry.exercises.length} exercises · ${setCount} sets · ${entry.volume}lbs volume</div>
          </div>
          <span class="mg-chevron">▶</span>
        </div>
        <div class="hist-body" id="hist-body-${realIdx}">
          ${entry.exercises.map(ex=>`

              <div class="hist-ex-name">${ex.name}</div>
              <div class="hist-sets">${ex.sets.map((s,i)=>`<span class="hist-set">${s.w||'—'}lbs × ${s.reps||'—'}</span>`).join('')}</div>

  // ── DATA BACKUP ──
  h += `<div class="card" style="border-color:var(--border2);">

  h += `</div>`;

const STRENGTH_STANDARDS = [
  {lift:"Flat barbell bench press", key:"Flat barbell bench press", levels:{Beginner:0.75, Novice:1.0, Intermediate:1.25, Advanced:1.5, Elite:1.85}},
  {lift:"Back squat", key:"Back squat (barbell)", levels:{Beginner:1.0, Novice:1.25, Intermediate:1.5, Advanced:2.0, Elite:2.5}},

];

function standardsView() {
  const bodylog = DB.get('bodylog', []).filter(e=>e.kg);
  const bw = bodylog.length ? bodylog[bodylog.length-1].kg : 75;
  let h = `<div class="panel"><div class="panel-title">Strength Standards</div><div class="panel-sub">Where your estimated 1RM (lbs) sits relative to typical standards for your bodyweight (${bw} kg). Based on logged lifts.</div>`;

  h += `<div class="card"><div class="card-title">Your bodyweight</div>
    <div class="input-row">
      <input type="number" inputmode="decimal" id="std-bw" placeholder="Bodyweight (kg)" value="${bw}">
      <button class="btn" onclick="recalcStandards()">Update</button>
    </div>
    <div style="font-size:11px;color:var(--muted);">Auto-filled from your latest Body log entry.</div>
  </div>`;

  const prs = DB.get('prs', {});
  STRENGTH_STANDARDS.forEach((std, idx) => {
    // find user's best e1rm matching this lift
    let userMax = 0;
    Object.keys(prs).forEach(name => {
      if (name.includes(std.key.split(' (')[0]) || std.key.includes(name.split(' (')[0])) {
        const last = prs[name][prs[name].length-1];
        if (last && last.e1rm > userMax) userMax = last.e1rm;
      }
    });
    h += `<div class="card" id="std-card-${idx}" data-lift="${idx}">
      <div class="card-title">${std.lift}</div>
      <div style="font-size:12px;color:${userMax?'var(--gold)':'var(--dim)'};margin-bottom:10px;">${userMax?`Your est. 1RM: ${userMax} lb`:'No data — log this lift to see your level'}</div>
      <div class="std-bar-wrap" id="std-bar-${idx}"></div>
    </div>`;
  });
  h += `</div>`;
  return h;

function drawStandards() {
  const bwInput = document.getElementById('std-bw');
  const bwKg = bwInput ? +bwInput.value || 75 : 75;
  const bw = bwKg * 2.20462; // standards multipliers apply to bodyweight; lifts are in lbs
  const prs = DB.get('prs', {});
  STRENGTH_STANDARDS.forEach((std, idx) => {
    let userMax = 0;
    Object.keys(prs).forEach(name => {
      if (name.includes(std.key.split(' (')[0]) || std.key.includes(name.split(' (')[0])) {
        const last = prs[name][prs[name].length-1];
        if (last && last.e1rm > userMax) userMax = last.e1rm;
      }
    });
    const wrap = document.getElementById('std-bar-'+idx);
    if (!wrap) return;
    const levels = Object.keys(std.levels);
    const eliteVal = std.levels.Elite * bw;
    let bars = '';
    levels.forEach(lvl => {
      const val = Math.round(std.levels[lvl] * bw);
      const pct = (val/eliteVal)*100;
      const reached = userMax >= val;
      bars += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
        <div style="width:74px;font-size:10px;color:${reached?'var(--green-bright)':'var(--dim)'};">${lvl}</div>
        <div style="flex:1;height:14px;background:var(--surface2);border-radius:3px;overflow:hidden;position:relative;">
          <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:${reached?'linear-gradient(90deg,#2d5a22,#4d8a3a)':'#1e2a1e'};"></div>
        </div>
        <div style="width:48px;text-align:right;font-size:10px;color:${reached?'var(--text)':'var(--muted)'};">${val} lb</div>
      </div>`;
    });
    // user marker
    if (userMax > 0) {
      const userPct = Math.min(100,(userMax/eliteVal)*100);
      bars += `<div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
        <div style="width:74px;font-size:10px;color:var(--gold);font-weight:600;">YOU</div>
        <div style="flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${userPct}%;background:var(--gold);"></div>
        </div>
        <div style="width:48px;text-align:right;font-size:10px;color:var(--gold);font-weight:600;">${userMax} lb</div>
      </div>`;
    }
    wrap.innerHTML = bars;
  });
}
function recalcStandards() {
  const bw = +document.getElementById('std-bw').value;
  if (bw) {
    // persist as a body log entry so it sticks
    const log = DB.get('bodylog', []);
    const today = todayStr();
    const ex = log.find(e=>e.date===today);
    if (ex) ex.kg = bw; else log.push({date:today, kg:bw, cal:null});
    log.sort((a,b)=>a.date.localeCompare(b.date));
    DB.set('bodylog', log);
  }
  drawStandards();
}

  // Trend chart of fatigue
  if (log.length) {
    h += `<div class="card"><div class="card-title">Fatigue trend (14d)</div><div class="chart-wrap"><svg class="chart" id="recovery-chart"></svg></div></div>`;
    // Recent log
    h += `<div class="card"><div class="card-title">Recent</div><div class="log-list">`;
    log.slice(-7).reverse().forEach(e=>{
      const sore = Object.keys(e.soreness||{}).filter(k=>e.soreness[k]>=3);
      h += `<div class="log-item"><span class="log-date">${fmtDate(e.date)}</span><span class="log-val">Fatigue ${e.fatigue||'—'}/10${e.sleep?' · '+e.sleep+'h sleep':''}${sore.length?' · sore: '+sore.join(', '):''}</span></div>`;
    });
    h += `</div></div>`;
  }
  h += `</div>`;
  return h;
}
function sorenessLabel(v) { return ['None','Mild','Moderate','Sore','Very sore','Severe'][v] || 'None'; }
function sorenessColor(v) { return v>=4?'var(--danger)':v>=3?'var(--core)':v>=1?'var(--gold)':'var(--dim)'; }

let recDraft = null;
function getRecDraft() {
  if (!recDraft) {
    const log = DB.get('recovery', []);
    const today = todayStr();
    const e = log.find(x=>x.date===today);
    recDraft = e ? JSON.parse(JSON.stringify(e)) : {date:today, soreness:{}, fatigue:5, sleep:''};
  }
  return recDraft;
}
function updateSoreness(m, val) {
  const d = getRecDraft(); d.soreness[m] = +val;
  document.getElementById('sore-val-'+m).textContent = sorenessLabel(+val);
  document.getElementById('sore-val-'+m).style.color = sorenessColor(+val);
}
function updateFatigue(val) {
  const d = getRecDraft(); d.fatigue = +val;
  document.getElementById('fatigue-val').textContent = val+'/10';
}
function saveRecovery() {
  const d = getRecDraft();
  d.sleep = document.getElementById('rec-sleep').value;
  const log = DB.get('recovery', []);
  const today = todayStr();
  const idx = log.findIndex(e=>e.date===today);
  if (idx>=0) log[idx] = d; else log.push(d);
  log.sort((a,b)=>a.date.localeCompare(b.date));
  DB.set('recovery', log);
  recDraft = null;
  renderView();
}
function drawRecoveryChart() {
  const log = DB.get('recovery', []).filter(e=>e.fatigue);
  if (log.length) drawLineChart('recovery-chart', log.slice(-14).map(e=>({x:e.date,y:e.fatigue})), '#e8a070');
}

const DEFAULT_SUPPS = ["Creatine","Whey protein","Vitamin D","Zinc","Magnesium","Omega-3","Multivitamin","Caffeine"];
function suppsView() {
  const supps = DB.get('supps_list', DEFAULT_SUPPS);
  const taken = DB.get('supps_taken', {});
  const today = todayStr();
  const todayTaken = taken[today] || {};

  let h = `<div class="panel"><div class="panel-title">Supplements</div><div class="panel-sub">Tap + each time you take a supplement — it stamps the time. Log the same one multiple times a day.</div>`;

  h += `<div class="card"><div class="card-title">Today — ${fmtDate(today)}</div>`;
  supps.forEach(s => {
    const doses = todayTaken[s] || []; // array of time strings
    h += `<div class="supp-time-row">
      <div style="flex:1;">
        <div class="supp-time-name">${s}</div>
        <div class="supp-times">
          ${doses.length ? doses.map((t,ti)=>`<span class="supp-time-chip">${t}<span onclick="removeDose('${s.replace(/'/g,"\\'")}',${ti})">×</span></span>`).join('') : '<span style="font-size:10px;color:var(--dim);">Not taken yet</span>'}
        </div>
      </div>
      <button class="supp-add-btn" onclick="addDose('${s.replace(/'/g,"\\'")}')">+</button>
    </div>`;
  });
  h += `</div>`;

  // Add custom supplement
  h += `<div class="card"><div class="card-title">Manage supplements</div>
    <div class="input-row">
      <input type="text" id="new-supp" placeholder="e.g. Ashwagandha">
      <button class="btn" onclick="addSupp()">Add</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
      ${supps.map(s=>`<span style="font-size:11px;color:var(--muted);background:var(--surface2);padding:4px 8px;border-radius:3px;">${s} <span onclick="removeSupp('${s.replace(/'/g,"\\'")}')" style="color:var(--danger);cursor:pointer;margin-left:2px;">×</span></span>`).join('')}
    </div>
  </div>`;

  // 7 day consistency (counts days where taken at least once)
  const last7 = [];
  for (let i=6;i>=0;i--) { const d=new Date(); d.setDate(d.getDate()-i); last7.push(d.toISOString().slice(0,10)); }
  h += `<div class="card"><div class="card-title">7-day consistency</div>`;
  supps.forEach(s => {
    let count = 0;
    last7.forEach(d => { if (taken[d] && taken[d][s] && taken[d][s].length) count++; });
    h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <div style="width:90px;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s}</div>
      <div style="flex:1;display:flex;gap:3px;">
        ${last7.map(d=>{ const n = taken[d]&&taken[d][s]?taken[d][s].length:0; return `<div title="${n} doses" style="flex:1;height:14px;border-radius:2px;background:${n>=2?'var(--green-bright)':n===1?'var(--green)':'var(--surface2)'};"></div>`; }).join('')}
      </div>
      <div style="width:30px;text-align:right;font-size:10px;color:var(--gold);">${count}/7</div>
    </div>`;
  });
  h += `</div></div>`;
  return h;
}
function nowTime() {
  const d = new Date();
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function addDose(s) {
  const taken = DB.get('supps_taken', {});
  const today = todayStr();
  if (!taken[today]) taken[today] = {};
  if (!taken[today][s]) taken[today][s] = [];
  taken[today][s].push(nowTime());
  DB.set('supps_taken', taken);
  renderWellnessSub();
}
function removeDose(s, ti) {
  const taken = DB.get('supps_taken', {});
  const today = todayStr();
  if (taken[today] && taken[today][s]) {
    taken[today][s].splice(ti, 1);
    if (!taken[today][s].length) delete taken[today][s];
    DB.set('supps_taken', taken);
    renderWellnessSub();
  }
}
function addSupp() {
  const val = document.getElementById('new-supp').value.trim();
  if (!val) return;
  const supps = DB.get('supps_list', DEFAULT_SUPPS);
  if (!supps.includes(val)) supps.push(val);
  DB.set('supps_list', supps);
  renderWellnessSub();
}
function removeSupp(s) {
  let supps = DB.get('supps_list', DEFAULT_SUPPS);
  supps = supps.filter(x=>x!==s);
  DB.set('supps_list', supps);
  renderWellnessSub();
}

/* ============ LOG WORKOUT + HISTORY ============ */
function logWorkoutBtn() {
  const dayIdx = activeDay;
  const w = W[dayIdx];
  if (!w) return;
  const sessions = DB.get('sessions', {});
  const key = dayIdx + ':' + todayStr();
  const sess = sessions[key];
  if (!sess) { showToast("Log some sets first"); return; }

  // Build a history snapshot
  const entry = { day: DAYS[dayIdx].l, dayIdx, date: todayStr(), ts: Date.now(), exercises: [], volume: 0, notes: sess._notes || '' };
  let anyData = false;
  w.secs.forEach((sec,si) => sec.ex.forEach((ex,ei) => {
    const sets = [];
    for (let s=0; s<ex.sets; s++) {
      const c = sess[`${si}-${ei}-${s}`];
      if (c && (c.w || c.reps)) {
        sets.push({w: c.w||'', reps: c.reps||'', done: !!c.done});
        if (c.w && c.reps) entry.volume += +c.w * +c.reps;
        anyData = true;
      }
    }
    if (sets.length) entry.exercises.push({name: ex.n, sets});
  }));

  if (!anyData) { showToast("Log some sets first"); return; }

  entry.volume = Math.round(entry.volume);

  // Save to history
  const history = DB.get('history', []);
  history.push(entry);
  DB.set('history', history);

  // Reset current session inputs
  delete sessions[key];
  DB.set('sessions', sessions);

  showToast(`Workout logged · ${entry.volume} lbs volume`);
  renderDay();
  renderDayTabs();
}

function showToast(msg) {
  const t = document.getElementById('toast-pop');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function historySection() {
  const history = DB.get('history', []);
  if (!history.length) {
    return `<div class="card"><div class="card-title">Workout Memory</div><div class="chart-empty">No logged workouts yet. Finish a session in the Train tab and hit "Log Workout" to save it here.</div></div>`;
  }
  const recent = [...history].reverse().slice(0, 30);
  let h = `<div class="card" style="border-color:var(--gold-dim);"><div class="card-title">Workout Memory — ${history.length} logged</div>`;
  recent.forEach((e, i) => {

    h += `<div class="hist-entry">

        <div><div class="hist-day">${e.day}</div><div class="hist-date">${fmtDate(e.date)}</div></div>

        <div style="padding:8px 14px;"><button class="btn btn-sm btn-danger" onclick="deleteHist(${realIdx})">Delete</button></div>

function toggleHist(idx) {

/* ============ DATA BACKUP (Export / Import) ============ */
function exportData() {
  const keys = ['sessions','history','prs','bodylog','recovery','supps_list','supps_taken','wolf','fast','warmup_open','selected_diet'];
  const dump = { app:"Iron Gold Rising", exported: new Date().toISOString(), data:{} };
  keys.forEach(k => { const v = localStorage.getItem('ironstoa_'+k); if (v !== null) dump.data[k] = v; });
  const blob = new Blob([JSON.stringify(dump,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'iron-gold-rising-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup saved 💾');
}
function importData(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const dump = JSON.parse(e.target.result);
      if (!dump.data) throw new Error('bad file');
      Object.keys(dump.data).forEach(k => localStorage.setItem('ironstoa_'+k, dump.data[k]));
      showToast('Backup restored ✓');
      renderView();
    } catch(err) { showToast('Import failed — invalid file'); }
  };
  reader.readAsText(file);
}
